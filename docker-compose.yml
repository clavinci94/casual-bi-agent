services:
  db:
    image: pgvector/pgvector:pg16
    container_name: causalbi-db
    environment:
      POSTGRES_DB: causalbi
      POSTGRES_USER: causalbi
      POSTGRES_PASSWORD: causalbi
    ports:
      - "5433:5432"
    volumes:
      - causalbi_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U causalbi -d causalbi"]
      interval: 5s
      retries: 10

  r-causal:
    build:
      context: ./r-service
      dockerfile: Dockerfile
    container_name: causalbi-r
    ports:
      - "8765:8765"
    volumes:
      # Mounted so iterating on api.R doesn't require a rebuild.
      - ./r-service:/app

volumes:
  causalbi_pgdata:
