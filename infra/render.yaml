# Render Blueprint for Causal BI Agent.
#
# Provisions:
#   - api:       FastAPI backend (the agent loop)
#   - r-causal:  CausalImpact service (R + Plumber)
#   - hitl:      Streamlit HITL approval UI
#
# Database is external (Neon). Frontend (Next.js) is hosted on Vercel
# separately — see infra/deploy.md for the Vercel setup.
#
# Secrets live in the Render env group "biq-secrets". Required keys:
#   DATABASE_URL=postgresql+psycopg://...neon.tech/...?sslmode=require
#   ANTHROPIC_API_KEY=sk-ant-...
#   BIQ_API_KEY=...                       (machine auth for n8n/scripts)
#   BIQ_JWT_JWKS_URL=https://<tenant>.eu.auth0.com/.well-known/jwks.json
#   BIQ_JWT_ISSUER=https://<tenant>.eu.auth0.com/
#   BIQ_JWT_AUDIENCE=https://api.causal-bi.local
#   SHOPIFY_*                             (only if hitting live Shopify)
#   TAVILY_API_KEY                        (only if running Markt-Radar)
#
# After connecting this repo to Render:
#   1. Create the "biq-secrets" env group with the keys above.
#   2. Render Blueprint -> link to this repo -> apply.
#   3. Apply pending Alembic migrations (see deploy.md).
#   4. Update Auth0 dashboard with the Vercel callback URLs.

services:
  - type: web
    name: biq-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    plan: starter
    healthCheckPath: /healthz
    envVars:
      - key: APP_ENV
        value: production
      - key: R_BASE_URL
        fromService:
          type: pserv
          name: biq-r-causal
          property: hostport
      # Auth mode — bearer_jwt validates Auth0 access-tokens against the
      # tenant's JWKS. The X-API-Key fallback (see api/auth.py) lets
      # machine callers like n8n use a shared secret.
      - key: BIQ_AUTH_MODE
        value: bearer_jwt
      - fromGroup: biq-secrets

  - type: pserv
    name: biq-r-causal
    runtime: docker
    dockerfilePath: ./r-service/Dockerfile
    plan: starter
    autoDeploy: true

  - type: web
    name: biq-hitl
    runtime: docker
    dockerfilePath: ./backend/Dockerfile.streamlit
    plan: starter
    healthCheckPath: /
    envVars:
      - fromGroup: biq-secrets
